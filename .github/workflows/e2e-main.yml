name: E2E Tests (Main App)

on: push

permissions:
  contents: read

env:
  NODE_VERSION: 24

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --ipc=host
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      BETTER_AUTH_SECRET: test-secret-for-ci
      DATABASE_URL: postgres://postgres:postgres@db:5432/zoonk_e2e
      DATABASE_URL_UNPOOLED: postgres://postgres:postgres@db:5432/zoonk_e2e
      E2E_TESTING: "true"
      NEXT_PUBLIC_APP_DOMAIN: localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    services:
      db:
        image: postgres:18-alpine
        ports: ["5432:5432"]
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zoonk_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/main/.next-e2e/cache
          key: ${{ runner.os }}-nextjs-main-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/main/**/*.ts', 'apps/main/**/*.tsx', 'packages/**/*.ts', 'packages/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-main-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-main-

      - name: Setup pnpm
        uses: pnpm/action-setup@9b5745cdf0a2e8c2620f0746130f809adb911c19
        with:
          version: 10.33.0

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Configure database host for container networking
        run: sed -i 's/@localhost:5432/@db:5432/g' packages/db/.env.e2e

      - name: Setup database
        run: pnpm --filter @zoonk/db db:setup:e2e

      - name: Run E2E tests
        run: pnpm e2e --filter main -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}
