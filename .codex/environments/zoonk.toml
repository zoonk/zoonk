# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "zoonk"

[setup]
script = '''
set -eu

cd "$CODEX_WORKTREE_PATH"

primary_worktree="$(dirname "$(git rev-parse --path-format=absolute --git-common-dir)")"

for relative_path in \
  apps/admin/.env \
  apps/api/.env \
  apps/evals/.env \
  apps/main/.env \
  packages/db/.env
do
  source_path="$primary_worktree/$relative_path"
  destination_path="$CODEX_WORKTREE_PATH/$relative_path"

  if [ -f "$source_path" ] && [ "$source_path" != "$destination_path" ]; then
    mkdir -p "$(dirname "$destination_path")"
    cp "$source_path" "$destination_path"
    chmod 600 "$destination_path"
  fi
done

pnpm install --frozen-lockfile
pnpm db:generate
'''

[[actions]]
name = "Dev"
icon = "run"
command = "pnpm dev"

[[actions]]
name = "Code quality"
icon = "tool"
command = "pnpm i18n:lint && pnpm typecheck && pnpm turbo format && pnpm turbo lint && pnpm knip && pnpm knip --production"

[[actions]]
name = "Tests"
icon = "test"
command = "pnpm test"

[[actions]]
name = "Main E2E"
icon = "test"
command = "pnpm --filter @zoonk/db db:setup:e2e && pnpm e2e --filter main"

[[actions]]
name = "API E2E"
icon = "test"
command = "pnpm --filter @zoonk/db db:setup:e2e && pnpm e2e --filter api"
